# release.yml — Сборка и публикация релиза при создании тега v*.
# Собирает Windows (NSIS + portable), создаёт GitHub Release с артефактами.
# Также генерирует latest.yml для electron-updater.

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          standalone: true
          run_install: false

      # Гарантируем, что PNPM_HOME попадает в PATH на Windows до первого pnpm вызова и сохраняется для следующих шагов.
      - name: Export pnpm to PATH
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (-not $env:PNPM_HOME) {
            Write-Error "PNPM_HOME is empty"
          }
          echo "PNPM_HOME=$env:PNPM_HOME"
          # prepend PNPM_HOME to PATH for current session
          $env:PATH = "$env:PNPM_HOME;" + $env:PATH
          # persist for subsequent steps
          echo "$env:PNPM_HOME" >> $env:GITHUB_PATH
          echo "Updated PATH: $env:PATH"
          pnpm --version

      # Это важно, чтобы artifactName и latest.yml имели корректный номер версии и совпадали с Release-тегом.
      - name: Set version from tag (Windows)
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          # Получаем имя тега из контекста (например, v1.0.3) и убираем префикс v, если он есть
          $tag = '${{ github.ref_name }}'
          $version = if ($tag.StartsWith('v')) { $tag.Substring(1) } else { $tag }

          # Дополняем патч-часть до X.Y.Z, иначе npm/pnpm выдаёт "Invalid version"
          if ($version -notmatch '^[0-9]+\.[0-9]+\.[0-9]+$') {
            if ($version -match '^[0-9]+\.[0-9]+$') {
              $version = "$version.0"
            } else {
              throw "Tag '$tag' is not a semver X.Y[.Z]"
            }
          }

          # Переходим в проект и записываем версию без попыток создавать коммиты/теги
          Set-Location editor-app
          pnpm version $version --no-git-tag-version
      #endregion

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline
        working-directory: editor-app

      - name: Build & Package
        run: pnpm run build:win
        working-directory: editor-app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            editor-app/dist/UndefsceneEditor-*-setup.exe
            editor-app/dist/UndefsceneEditor-*-portable.exe
            editor-app/dist/latest.yml
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          standalone: true
          run_install: false

      #region Версию приложения синхронизируем с тегом (bash): vX.Y.Z -> X.Y.Z
      - name: Set version from tag (macOS)
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"

          # Приводим к виду X.Y.Z (если пришёл X.Y — дополняем .0; всё остальное считаем ошибкой)
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            if [[ "$version" =~ ^[0-9]+\.[0-9]+$ ]]; then
              version="${version}.0"
            else
              echo "Tag '$tag' is not a semver X.Y[.Z]" >&2
              exit 1
            fi
          fi

          cd editor-app
          pnpm version "$version" --no-git-tag-version
      #endregion

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline
        working-directory: editor-app

      - name: Create unsigned macOS builder config
        shell: bash
        working-directory: editor-app
        run: |
          cat > electron-builder.mac-unsigned.yml <<'EOF'
          appId: com.undefscene.editor
          productName: Undefscene Editor Unsigned
          directories:
            buildResources: build
          files:
            - '!**/.vscode/*'
            - '!src/*'
            - '!electron.vite.config.{js,ts,mjs,cjs}'
            - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
            - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
            - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
          asarUnpack:
            - resources/**
          mac:
            artifactName: UndefsceneEditor-unsigned-${version}-${arch}.${ext}
            identity: null
            forceCodeSigning: false
            hardenedRuntime: false
            notarize: false
          dmg:
            artifactName: UndefsceneEditor-unsigned-${version}.${ext}
          npmRebuild: false
          publish:
            provider: github
            owner: nos0uls
            repo: Undefscene
          EOF

      - name: Build & Package
        run: pnpm exec electron-vite build && pnpm exec electron-builder --mac --config electron-builder.mac-unsigned.yml --publish never
        working-directory: editor-app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Rename unsigned update manifest
        shell: bash
        working-directory: editor-app
        run: |
          if [[ -f dist/latest-mac.yml ]]; then
            mv dist/latest-mac.yml dist/latest-mac-unsigned.yml
          fi

      - name: Upload artifacts to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            editor-app/dist/UndefsceneEditor-unsigned-*.dmg
            editor-app/dist/UndefsceneEditor-unsigned-*.zip
            editor-app/dist/latest-mac-unsigned.yml
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
